<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0f1a;
      --surface:   #131829;
      --surface2:  #1a2038;
      --border:    #232b44;
      --accent:    #4f8cff;
      --accent2:   #a78bfa;
      --danger:    #ff5c7a;
      --success:   #34d399;
      --text:      #e8eaf6;
      --muted:     #7b84a3;
      --radius:    14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background mesh ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 80% 10%, rgba(79,140,255,.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 80%, rgba(167,139,250,.08) 0%, transparent 55%);
      pointer-events: none;
    }

    .page-wrap {
      position: relative; z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 48px;
      gap: 16px;
      flex-wrap: wrap;
      animation: fadeDown .5s ease both;
    }

    .header-left h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.1;
      background: linear-gradient(120deg, var(--text) 40%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-left p {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 300;
    }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: .03em;
      padding: 12px 24px;
      border-radius: 50px;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s, background .2s;
      box-shadow: 0 4px 20px rgba(79,140,255,.35);
      white-space: nowrap;
    }

    .btn-add:hover {
      transform: translateY(-2px);
      background: #6aa0ff;
      box-shadow: 0 8px 30px rgba(79,140,255,.50);
    }

    .btn-add svg { flex-shrink: 0; }

    /* ── Stats strip ── */
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      animation: fadeUp .5s .1s ease both;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 24px;
      flex: 1;
      min-width: 140px;
    }

    .stat-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      font-weight: 500;
    }

    .stat-card .value {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-top: 4px;
      color: var(--text);
    }

    .stat-card .value.blue  { color: var(--accent); }
    .stat-card .value.green { color: var(--success); }
    .stat-card .value.purple{ color: var(--accent2); }

    /* ── Table card ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp .5s .2s ease both;
    }

    .table-card-header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .table-card-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #searchInput {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 9px 16px 9px 36px;
      width: 220px;
      outline: none;
      transition: border-color .2s;
    }

    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--muted); }

    /* ── Table ── */
    .table-scroll { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 20px;
      text-align: left;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    thead th:first-child { border-radius: 0; padding-left: 28px; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: rgba(79,140,255,.05); }

    tbody td {
      padding: 16px 20px;
      font-size: 14px;
      color: var(--text);
      vertical-align: middle;
    }

    tbody td:first-child { padding-left: 28px; }

    /* ID badge */
    .id-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      color: var(--muted);
      width: 36px;
      height: 28px;
    }

    /* Avatar + name */
    .name-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: #fff;
      flex-shrink: 0;
    }

    .name-cell .emp-name { font-weight: 500; }
    .name-cell .emp-email { font-size: 12px; color: var(--muted); margin-top: 1px; }

    /* Designation chip */
    .chip {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(79,140,255,.12);
      color: var(--accent);
      border: 1px solid rgba(79,140,255,.25);
    }

    /* Age */
    .age-val { color: var(--muted); font-size: 13px; }

    /* Action buttons */
    .actions { display: flex; gap: 8px; }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform .15s, opacity .15s;
    }

    .btn-icon:hover { transform: translateY(-1px); opacity: .9; }

    .btn-edit {
      background: rgba(79,140,255,.15);
      color: var(--accent);
      border: 1px solid rgba(79,140,255,.25);
    }

    .btn-delete {
      background: rgba(255,92,122,.12);
      color: var(--danger);
      border: 1px solid rgba(255,92,122,.22);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 72px 24px;
    }

    .empty-state svg { opacity: .25; margin-bottom: 16px; }

    .empty-state p {
      color: var(--muted);
      font-size: 15px;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    tbody tr {
      animation: fadeUp .35s ease both;
    }
    tbody tr:nth-child(1)  { animation-delay: .05s; }
    tbody tr:nth-child(2)  { animation-delay: .10s; }
    tbody tr:nth-child(3)  { animation-delay: .15s; }
    tbody tr:nth-child(4)  { animation-delay: .20s; }
    tbody tr:nth-child(5)  { animation-delay: .25s; }
    tbody tr:nth-child(n+6){ animation-delay: .30s; }
  </style>
</head>
<body>
<div class="page-wrap">

  <!-- Header -->
  <header>
    <div class="header-left">
      <h1>Employee Hub</h1>
      <p>Manage your workforce in one place</p>
    </div>
    <a href="/add" class="btn-add">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
      Add Employee
    </a>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="label">Total Employees</div>
      <div class="value blue" id="totalCount">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Unique Roles</div>
      <div class="value purple" id="rolesCount">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Avg. Age</div>
      <div class="value green" id="avgAge">—</div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-card-header">
      <h2>All Employees</h2>
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search employees…" oninput="filterTable()"/>
      </div>
    </div>

    <div class="table-scroll">
      <table id="empTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Employee</th>
            <th>Designation</th>
            <th>Age</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Thymeleaf loop -->
          <tr th:each="employee : ${attemptlist}" th:attr="data-name=${employee.name}, data-desig=${employee.designation}">
            <td><span class="id-badge" th:text="${employee.id}">1</span></td>
            <td>
              <div class="name-cell">
                <div class="avatar" th:text="${#strings.toUpperCase(#strings.substring(employee.name,0,1))}">A</div>
                <div>
                  <div class="emp-name" th:text="${employee.name}">John Doe</div>
                  <div class="emp-email" th:text="${employee.email}">john@example.com</div>
                </div>
              </div>
            </td>
            <td><span class="chip" th:text="${employee.designation}">Engineer</span></td>
            <td><span class="age-val" th:text="${employee.age}">28</span></td>
            <td>
              <div class="actions">
                <a th:href="@{/updateform/{id}(id=${employee.id})}" class="btn-icon btn-edit">
                  <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                  </svg>
                  Edit
                </a>
                <a th:href="@{/delete/{id}(id=${employee.id})}" class="btn-icon btn-delete"
                   onclick="return confirm('Delete this employee?')">
                  <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                  </svg>
                  Delete
                </a>
              </div>
            </td>
          </tr>

          <!-- Empty state (shown when no employees) -->
          <tr th:if="${#lists.isEmpty(attemptlist)}">
            <td colspan="5">
              <div class="empty-state">
                <svg width="56" height="56" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                <p>No employees found. <a href="/add" style="color:var(--accent)">Add your first one →</a></p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // ── Stats calculation ──
  window.addEventListener('DOMContentLoaded', () => {
    const rows = document.querySelectorAll('#empTable tbody tr[data-name]');
    const total = rows.length;
    document.getElementById('totalCount').textContent = total;

    const roles = new Set([...rows].map(r => r.dataset.desig?.trim()).filter(Boolean));
    document.getElementById('rolesCount').textContent = roles.size;

    const ages = [...rows]
      .map(r => parseInt(r.querySelector('.age-val')?.textContent))
      .filter(n => !isNaN(n));
    document.getElementById('avgAge').textContent =
      ages.length ? Math.round(ages.reduce((a,b)=>a+b,0)/ages.length) : '—';
  });

  // ── Search filter ──
  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#empTable tbody tr[data-name]').forEach(row => {
      const name  = (row.dataset.name  || '').toLowerCase();
      const desig = (row.dataset.desig || '').toLowerCase();
      const email = (row.querySelector('.emp-email')?.textContent || '').toLowerCase();
      row.style.display = (name.includes(q) || desig.includes(q) || email.includes(q)) ? '' : 'none';
    });
  }
</script>
</body>
</html>
