<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Employee</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0f1a;
      --surface:  #131829;
      --surface2: #1a2038;
      --border:   #232b44;
      --accent:   #4f8cff;
      --accent2:  #a78bfa;
      --success:  #34d399;
      --danger:   #ff5c7a;
      --text:     #e8eaf6;
      --muted:    #7b84a3;
      --radius:   14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(79,140,255,.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(167,139,250,.10) 0%, transparent 55%);
      pointer-events: none;
    }

    .card {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 540px;
      overflow: hidden;
      animation: slideUp .45s ease both;
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
    }

    /* Card top bar */
    .card-banner {
      background: linear-gradient(120deg, rgba(79,140,255,.18), rgba(167,139,250,.14));
      border-bottom: 1px solid var(--border);
      padding: 32px 36px 28px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: .04em;
      transition: color .2s;
      margin-bottom: 18px;
    }
    .back-link:hover { color: var(--accent); }

    .card-banner h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.02em;
      background: linear-gradient(110deg, var(--text) 50%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-banner p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 5px;
      font-weight: 300;
    }

    /* Form body */
    .card-body { padding: 32px 36px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .field { display: flex; flex-direction: column; gap: 7px; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .input-wrap { position: relative; }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color .2s;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 12px 14px 12px 42px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,140,255,.15);
    }

    input:focus + .focus-border { display: block; }

    .input-wrap:focus-within svg { color: var(--accent); }

    /* Validation hint */
    .hint { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    /* Actions */
    .form-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-submit {
      flex: 1;
      background: var(--accent);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .04em;
      padding: 14px 24px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, background .2s;
      box-shadow: 0 4px 20px rgba(79,140,255,.30);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      background: #6aa0ff;
      box-shadow: 0 8px 28px rgba(79,140,255,.45);
    }

    .btn-submit:active { transform: translateY(0); }

    .btn-cancel {
      background: var(--surface2);
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 14px;
      padding: 14px 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
      text-decoration: none;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-cancel:hover { color: var(--text); border-color: var(--muted); }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .card-banner, .card-body { padding: 24px 22px; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="card-banner">
    <a href="/" class="back-link">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Back to Dashboard
    </a>
    <h1>Add Employee</h1>
    <p>Fill in the details to register a new team member.</p>
  </div>

  <div class="card-body">
    <form action="/save" method="post" th:object="${employee}">
      <div class="form-grid">

        <!-- Name -->
        <div class="field full">
          <label for="name">Full Name</label>
          <div class="input-wrap">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <input type="text" id="name" th:field="*{name}" placeholder="e.g. Arjun Mehta" required/>
          </div>
        </div>

        <!-- Email -->
        <div class="field full">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <input type="email" id="email" th:field="*{email}" placeholder="e.g. arjun@company.com" required/>
          </div>
        </div>

        <!-- Age -->
        <div class="field">
          <label for="age">Age</label>
          <div class="input-wrap">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <input type="number" id="age" th:field="*{age}" placeholder="e.g. 28" min="18" max="80" required/>
          </div>
          <span class="hint">Between 18 and 80</span>
        </div>

        <!-- Designation -->
        <div class="field">
          <label for="designation">Designation</label>
          <div class="input-wrap">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <input type="text" id="designation" th:field="*{designation}" placeholder="e.g. Software Engineer" required/>
          </div>
        </div>

      </div>

      <div class="divider"></div>

      <div class="form-actions">
        <a href="/" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-submit">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
          Save Employee
        </button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
